name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao-architecture
        uses: actions/checkout@v7

      - name: Verify architecture docs
        run: python3 scripts/verify_architecture.py

      - name: Verify external-beta preflight manifest and links
        run: python3 scripts/verify_external_beta_preflight.py --repository-only

      - name: Verify external-beta preflight unit tests
        run: python3 -m unittest scripts/test_verify_external_beta_preflight.py

      - name: Verify authority inventory
        run: python3 scripts/verify_topology.py

      - name: Verify topology unit tests
        run: python3 -m unittest scripts/test_verify_topology.py

      - name: Verify readiness wording
        run: python3 scripts/verify_readiness_wording.py

      - name: Verify readiness wording unit tests
        run: python3 -m unittest scripts/test_verify_readiness_wording.py

      - name: Verify contract inventory
        run: python3 scripts/verify_contract_inventory.py

      - name: Verify contract inventory unit tests
        run: python3 -m unittest scripts/test_verify_contract_inventory.py

      - name: Verify contract owner registry
        run: python3 scripts/verify_contract_owner_registry.py

      - name: Verify contract owner registry unit tests
        run: python3 -m unittest scripts/test_verify_contract_owner_registry.py

      - name: Verify compatibility matrix
        run: python3 scripts/verify_compatibility_matrix.py

      - name: Verify compatibility matrix unit tests
        run: python3 -m unittest scripts/test_verify_compatibility_matrix.py

      - name: Verify contract evolution policy
        run: python3 scripts/verify_contract_evolution_policy.py

      - name: Verify contract evolution policy unit tests
        run: python3 -m unittest scripts/test_verify_contract_evolution_policy.py

      - name: Verify stack lockfile
        run: python3 scripts/verify_stack_lock.py

      - name: Verify stack lockfile unit tests
        run: python3 -m unittest scripts/test_verify_stack_lock.py

      - name: Verify current release manifest
        run: python3 scripts/verify_current_release_manifest.py

      - name: Verify current release manifest unit tests
        run: python3 -m unittest scripts/test_verify_current_release_manifest.py

      - name: Verify Windows V3 manifest fixture
        run: python3 scripts/verify_windows_v3_manifest.py

      - name: Verify Windows V3 manifest fixture unit tests
        run: python3 -m unittest scripts/test_verify_windows_v3_manifest.py

      - name: Verify DSA measurement contract
        run: python3 scripts/verify_dsa_measurement_contract.py

      - name: Verify DSA measurement contract unit tests
        run: python3 -m unittest scripts/test_verify_dsa_measurement_contract.py

      - name: Verify beta install preflight matrix
        run: python3 scripts/verify_beta_install_preflight_matrix.py

      - name: Verify beta install preflight matrix unit tests
        run: python3 -m unittest scripts/test_verify_beta_install_preflight_matrix.py

      - name: Verify beta operations SLO draft
        run: python3 scripts/verify_beta_operations_slo_draft.py

      - name: Verify beta operations SLO draft unit tests
        run: python3 -m unittest scripts/test_verify_beta_operations_slo_draft.py

      - name: Public safety scan
        run: |
          pattern="ghp""_|github""_pat_|BEGIN ""RSA|BEGIN ""OPENSSH|ANTI""GRAVITY|private ""handoff|api""_key|access""_token"
          ! rg -n "$pattern" README.md overview scripts
