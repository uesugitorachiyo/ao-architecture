name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao-architecture
        uses: actions/checkout@v7

      - name: Verify architecture docs
        run: python3 scripts/verify_architecture.py

      - name: Verify authority inventory
        run: python3 scripts/verify_topology.py

      - name: Verify topology unit tests
        run: python3 -m unittest scripts/test_verify_topology.py

      - name: Verify readiness wording
        run: python3 scripts/verify_readiness_wording.py

      - name: Verify readiness wording unit tests
        run: python3 -m unittest scripts/test_verify_readiness_wording.py

      - name: Verify stack lockfile
        run: python3 scripts/verify_stack_lock.py

      - name: Verify stack lockfile unit tests
        run: python3 -m unittest scripts/test_verify_stack_lock.py

      - name: Public safety scan
        run: |
          pattern="ghp""_|github""_pat_|BEGIN ""RSA|BEGIN ""OPENSSH|ANTI""GRAVITY|private ""handoff|api""_key|access""_token"
          ! rg -n "$pattern" README.md overview scripts
