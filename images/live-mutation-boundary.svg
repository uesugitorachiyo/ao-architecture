<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">Authority-request dry-run boundary</title>
  <desc id="desc">Shows the current public-safe unrestricted self-modification authority-request dry-run class, while keeping unrestricted self-modification, sandbox bypass, real sandbox escape, provider calls, credentials, release, direct-main mutation, concurrent mutation, and broad public claims denied.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #526070; }
      .band { rx: 8; }
      .bandText { font: 700 14px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { stroke-width: 2; rx: 8; }
      .note { stroke-width: 1.6; rx: 8; }
      .cardTitle { font: 700 18px Inter, Arial, sans-serif; fill: #162033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #162033; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #3a4758; }
      .smallStrong { font: 700 13px Inter, Arial, sans-serif; fill: #253244; }
      .label { font: 700 11px Inter, Arial, sans-serif; fill: #263447; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 7; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #cbd5e1; stroke-width: 1.4; }
      .cellHead { font: 700 14px Inter, Arial, sans-serif; fill: #162033; }
      .cellText { font: 400 12px Inter, Arial, sans-serif; fill: #39485a; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="980"/>
  <text class="title" x="48" y="58">Authority-request dry-run boundary</text>
  <text class="subtitle" x="48" y="88">Current highest proven class is a no-execution authority-request dry-run; it is not unrestricted self-modification authority.</text>
  <rect class="band" x="48" y="120" width="1344" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="144">Request packet and denial evidence</text>
  <rect class="card" x="74" y="188" width="270" height="142" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="92" y="219">Authority-request packet</text>
  <text class="small" x="92" y="246">Exact-scope reversible request</text>
  <text class="small" x="92" y="266">No execution permission</text>
  <rect class="card" x="409" y="188" width="270" height="142" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="427" y="219">Covenant denial ticket</text>
  <text class="small" x="427" y="246"><tspan x="427" dy="0">Denies unrestricted self-</tspan><tspan x="427" dy="16">modification</tspan></text>
  <text class="small" x="427" y="278">Binds denied surfaces</text>
  <path class="arrow" d="M344 259 L409 259"/>
  <rect class="card" x="744" y="188" width="270" height="142" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="762" y="219">Sentinel hold</text>
  <text class="small" x="762" y="246"><tspan x="762" dy="0">Public-risk and kill-switch</tspan><tspan x="762" dy="16">trace</tspan></text>
  <text class="small" x="762" y="278">No unsafe activation</text>
  <path class="arrow" d="M679 259 L744 259"/>
  <rect class="card" x="1079" y="188" width="270" height="142" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="1097" y="219"><tspan x="1097" dy="0">Command / Promoter</tspan><tspan x="1097" dy="19">readback</tspan></text>
  <text class="small" x="1097" y="268">No-execution status</text>
  <text class="small" x="1097" y="288">Dry-run promotion evidence</text>
  <path class="arrow" d="M1014 259 L1079 259"/>
  <rect class="band" x="48" y="398" width="1344" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="422">Governed stack path</text>
  <rect class="card" x="74" y="466" width="270" height="142" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="92" y="497">Mission</text>
  <text class="small" x="92" y="524">Records objective and route</text>
  <text class="small" x="92" y="544">Readback only</text>
  <rect class="card" x="409" y="466" width="270" height="142" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="427" y="497">Blueprint / Atlas</text>
  <text class="small" x="427" y="524">Authorization and workgraph</text>
  <text class="small" x="427" y="544">No execution grant</text>
  <path class="arrow" d="M344 537 L409 537"/>
  <rect class="card" x="744" y="466" width="270" height="142" fill="#ffe9d2" stroke="#64748b"/>
  <text class="cardTitle" x="762" y="497">Foundry / Forge</text>
  <text class="small" x="762" y="524">Approval request and guard</text>
  <text class="small" x="762" y="544">Bounded packet only</text>
  <path class="arrow" d="M679 537 L744 537"/>
  <rect class="card" x="1079" y="466" width="270" height="142" fill="#eee8ff" stroke="#64748b"/>
  <text class="cardTitle" x="1097" y="497">AO2</text>
  <text class="small" x="1097" y="524">Dry-run evidence bundle</text>
  <text class="small" x="1097" y="544">No unrestricted mutation</text>
  <path class="arrow" d="M1014 537 L1079 537"/>
  <rect class="band" x="48" y="676" width="1344" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="700">Claim boundary</text>
  <rect class="card" x="74" y="744" width="270" height="142" fill="#e9f7df" stroke="#64748b"/>
  <text class="cardTitle" x="92" y="775">Proven</text>
  <text class="small" x="92" y="802"><tspan x="92" dy="0">Public-safe authority-request</tspan><tspan x="92" dy="16">dry-run</tspan></text>
  <text class="small" x="92" y="834"><tspan x="92" dy="0">Four exact-scope reversible</tspan><tspan x="92" dy="16">attempts</tspan></text>
  <rect class="card" x="409" y="744" width="270" height="142" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="427" y="775">Still denied</text>
  <text class="small" x="427" y="802">Unrestricted self-modification</text>
  <text class="small" x="427" y="822">Sandbox containment bypass</text>
  <text class="small" x="427" y="842">Real sandbox escape</text>
  <rect class="card" x="744" y="744" width="270" height="142" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="762" y="775">Still denied</text>
  <text class="small" x="762" y="802">Provider calls and credentials</text>
  <text class="small" x="762" y="822"><tspan x="762" dy="0">Release, deploy, publish,</tspan><tspan x="762" dy="16">upload, tags</tspan></text>
  <text class="small" x="762" y="854">Dependency updates</text>
  <rect class="card" x="1079" y="744" width="270" height="142" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="1097" y="775">Still denied</text>
  <text class="small" x="1097" y="802"><tspan x="1097" dy="0">Direct-main and concurrent</tspan><tspan x="1097" dy="16">mutation</tspan></text>
  <text class="small" x="1097" y="834">Hidden instruction mutation</text>
  <text class="small" x="1097" y="854">Broad public claims</text>
  <rect class="note" x="74" y="910" width="1275" height="42" fill="#e8edf3" stroke="#94a3b8"/>
  <text class="smallStrong" x="92" y="939">Readback can explain the dry-run decision. It cannot approve, execute, publish, mutate repositories, widen authority, or convert denied surfaces into allowed ones.</text>
</svg>
