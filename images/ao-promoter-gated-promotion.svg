<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="640" viewBox="0 0 1360 640" role="img" aria-labelledby="title desc">
  <title id="title">AO Promoter gated promotion</title>
  <desc id="desc">AO Promoter turns passing evidence into a dry-run activation and rollback plan only after all gates are satisfied.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #526070; }
      .band { rx: 8; }
      .bandText { font: 700 14px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { stroke-width: 2; rx: 8; }
      .note { stroke-width: 1.6; rx: 8; }
      .cardTitle { font: 700 18px Inter, Arial, sans-serif; fill: #162033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #162033; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #3a4758; }
      .smallStrong { font: 700 13px Inter, Arial, sans-serif; fill: #253244; }
      .label { font: 700 11px Inter, Arial, sans-serif; fill: #263447; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 7; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #cbd5e1; stroke-width: 1.4; }
      .cellHead { font: 700 14px Inter, Arial, sans-serif; fill: #162033; }
      .cellText { font: 400 12px Inter, Arial, sans-serif; fill: #39485a; }
    </style>
  </defs>
  <rect class="bg" width="1360" height="640"/>
  <text class="title" x="48" y="58">AO Promoter gated promotion</text>
  <text class="subtitle" x="48" y="88">Activation only after every gate has evidence.</text>
  <rect class="card" x="48" y="160" width="180" height="132" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="66" y="191">Arena gate</text>
  <text class="small" x="66" y="218">Benchmark win</text>
  <rect class="card" x="260" y="160" width="180" height="132" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="278" y="191">Crucible gate</text>
  <text class="small" x="278" y="218">Hardening passed</text>
  <path class="arrow" d="M228 226 L260 226"/>
  <rect class="card" x="472" y="160" width="180" height="132" fill="#e9f7df" stroke="#64748b"/>
  <text class="cardTitle" x="490" y="191"><tspan x="490" dy="0">Sentinel</tspan><tspan x="490" dy="19">verdict</tspan></text>
  <text class="small" x="490" y="240">Clear, no hold</text>
  <path class="arrow" d="M440 226 L472 226"/>
  <rect class="card" x="684" y="160" width="180" height="132" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="702" y="191"><tspan x="702" dy="0">Policy and run</tspan><tspan x="702" dy="19">proof</tspan></text>
  <text class="small" x="702" y="240">Covenant</text>
  <text class="small" x="702" y="260">Forge</text>
  <text class="small" x="702" y="280">AO2</text>
  <path class="arrow" d="M652 226 L684 226"/>
  <rect class="card" x="896" y="160" width="180" height="132" fill="#eee8ff" stroke="#64748b"/>
  <text class="cardTitle" x="914" y="191"><tspan x="914" dy="0">Promotion</tspan><tspan x="914" dy="19">packet</tspan></text>
  <text class="small" x="914" y="240">Candidate</text>
  <text class="small" x="914" y="260">Evidence refs</text>
  <path class="arrow" d="M864 226 L896 226"/>
  <rect class="card" x="1108" y="160" width="180" height="132" fill="#ffe9d2" stroke="#64748b"/>
  <text class="cardTitle" x="1126" y="191">Apply dry-run</text>
  <text class="small" x="1126" y="218"><tspan x="1126" dy="0">No default live</tspan><tspan x="1126" dy="16">mutation</tspan></text>
  <path class="arrow" d="M1076 226 L1108 226"/>
  <rect class="note" x="48" y="360" width="1264" height="76" fill="#e8edf3" stroke="#94a3b8"/>
  <text class="smallStrong" x="66" y="389">Promoter does not override Covenant policy, bypass AO2, or publish without rollback and readback evidence.</text>
</svg>
