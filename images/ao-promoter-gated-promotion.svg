<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">AO Promoter gated promotion</title>
  <desc id="desc">Shows evidence from Arena, Crucible, Sentinel, Covenant, Foundry, Forge, and AO2 flowing into promotion gates, activation plans, rollback plans, and dry-run apply.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #fbfcfe; }
      .title { font: 700 32px Arial, sans-serif; fill: #111827; }
      .input { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 12; }
      .gate { fill: #fef9c3; stroke: #a16207; stroke-width: 2; rx: 12; }
      .out { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 12; }
      .text { font: 700 16px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1080" height="620"/>
  <text class="title" x="56" y="58">AO Promoter: activation only after every gate has evidence</text>
  <rect class="input" x="70" y="118" width="190" height="72"/>
  <text class="text" x="120" y="148">Arena gate</text>
  <text class="small" x="107" y="172">benchmark win</text>
  <rect class="input" x="70" y="222" width="190" height="72"/>
  <text class="text" x="111" y="252">Crucible gate</text>
  <text class="small" x="103" y="276">hardening passed</text>
  <rect class="input" x="70" y="326" width="190" height="72"/>
  <text class="text" x="113" y="356">Sentinel verdict</text>
  <text class="small" x="112" y="380">clear, no hold</text>
  <rect class="input" x="70" y="430" width="190" height="72"/>
  <text class="text" x="105" y="460">Policy + run proof</text>
  <text class="small" x="100" y="484">Covenant, Forge, AO2</text>
  <rect class="gate" x="405" y="250" width="250" height="118"/>
  <text class="text" x="462" y="292">Promotion packet</text>
  <text class="small" x="446" y="322">candidate, evidence refs, gates</text>
  <rect class="out" x="780" y="120" width="220" height="82"/>
  <text class="text" x="828" y="153">Activation plan</text>
  <text class="small" x="824" y="178">next active stack</text>
  <rect class="out" x="780" y="258" width="220" height="82"/>
  <text class="text" x="834" y="291">Rollback plan</text>
  <text class="small" x="822" y="316">reversibility proof</text>
  <rect class="out" x="780" y="396" width="220" height="82"/>
  <text class="text" x="842" y="429">Apply dry-run</text>
  <text class="small" x="813" y="454">no default live mutation</text>
  <path class="arrow" d="M260 154 C320 170 365 230 405 276"/>
  <path class="arrow" d="M260 258 L405 292"/>
  <path class="arrow" d="M260 362 C324 354 360 334 405 318"/>
  <path class="arrow" d="M260 466 C332 436 368 372 405 342"/>
  <path class="arrow" d="M655 296 C710 238 744 178 780 160"/>
  <path class="arrow" d="M655 308 L780 298"/>
  <path class="arrow" d="M655 332 C714 366 744 416 780 438"/>
</svg>
