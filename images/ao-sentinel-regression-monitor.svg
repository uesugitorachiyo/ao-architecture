<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="640" viewBox="0 0 1360 640" role="img" aria-labelledby="title desc">
  <title id="title">AO Sentinel safety and regression monitor</title>
  <desc id="desc">AO Sentinel evaluates public-safety and regression signals and emits clear, incident, or hold verdicts.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #526070; }
      .band { rx: 8; }
      .bandText { font: 700 14px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { stroke-width: 2; rx: 8; }
      .note { stroke-width: 1.6; rx: 8; }
      .cardTitle { font: 700 18px Inter, Arial, sans-serif; fill: #162033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #162033; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #3a4758; }
      .smallStrong { font: 700 13px Inter, Arial, sans-serif; fill: #253244; }
      .label { font: 700 11px Inter, Arial, sans-serif; fill: #263447; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 7; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #cbd5e1; stroke-width: 1.4; }
      .cellHead { font: 700 14px Inter, Arial, sans-serif; fill: #162033; }
      .cellText { font: 400 12px Inter, Arial, sans-serif; fill: #39485a; }
    </style>
  </defs>
  <rect class="bg" width="1360" height="640"/>
  <text class="title" x="48" y="58">AO Sentinel safety and regression monitor</text>
  <text class="subtitle" x="48" y="88">Watch safety and regressions before promotion.</text>
  <rect class="card" x="48" y="160" width="180" height="132" fill="#e8edf3" stroke="#64748b"/>
  <text class="cardTitle" x="66" y="191">Target</text>
  <text class="small" x="66" y="218"><tspan x="66" dy="0">Candidate or active</tspan><tspan x="66" dy="16">stack</tspan></text>
  <rect class="card" x="260" y="160" width="180" height="132" fill="#e9f7df" stroke="#64748b"/>
  <text class="cardTitle" x="278" y="191">Baseline</text>
  <text class="small" x="278" y="218"><tspan x="278" dy="0">Trusted regression</tspan><tspan x="278" dy="16">budgets</tspan></text>
  <path class="arrow" d="M228 226 L260 226"/>
  <rect class="card" x="472" y="160" width="180" height="132" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="490" y="191">Safety scan</text>
  <text class="small" x="490" y="218"><tspan x="490" dy="0">Public artifact</tspan><tspan x="490" dy="16">checks</tspan></text>
  <path class="arrow" d="M440 226 L472 226"/>
  <rect class="card" x="684" y="160" width="180" height="132" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="702" y="191">Regression diff</text>
  <text class="small" x="702" y="218">Current vs baseline</text>
  <path class="arrow" d="M652 226 L684 226"/>
  <rect class="card" x="896" y="160" width="180" height="132" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="914" y="191">Verdict</text>
  <text class="small" x="914" y="218"><tspan x="914" dy="0">Clear, incident, or</tspan><tspan x="914" dy="16">hold</tspan></text>
  <path class="arrow" d="M864 226 L896 226"/>
  <rect class="card" x="1108" y="160" width="180" height="132" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="1126" y="191">Promoter hold</text>
  <text class="small" x="1126" y="218"><tspan x="1126" dy="0">Blocks unsafe</tspan><tspan x="1126" dy="16">activation</tspan></text>
  <path class="arrow" d="M1076 226 L1108 226"/>
  <rect class="note" x="48" y="360" width="1264" height="76" fill="#e8edf3" stroke="#94a3b8"/>
  <text class="smallStrong" x="66" y="389">Sentinel is a non-mutating guardrail. Holds require repair evidence before promotion can continue.</text>
</svg>
