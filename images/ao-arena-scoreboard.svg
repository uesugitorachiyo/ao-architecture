<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="640" viewBox="0 0 1360 640" role="img" aria-labelledby="title desc">
  <title id="title">AO Arena deterministic scoreboard</title>
  <desc id="desc">AO Arena converts fixture benchmark evidence into deterministic scorecards and promotion-gate input.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #526070; }
      .band { rx: 8; }
      .bandText { font: 700 14px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { stroke-width: 2; rx: 8; }
      .note { stroke-width: 1.6; rx: 8; }
      .cardTitle { font: 700 18px Inter, Arial, sans-serif; fill: #162033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #162033; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #3a4758; }
      .smallStrong { font: 700 13px Inter, Arial, sans-serif; fill: #253244; }
      .label { font: 700 11px Inter, Arial, sans-serif; fill: #263447; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 7; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #cbd5e1; stroke-width: 1.4; }
      .cellHead { font: 700 14px Inter, Arial, sans-serif; fill: #162033; }
      .cellText { font: 400 12px Inter, Arial, sans-serif; fill: #39485a; }
    </style>
  </defs>
  <rect class="bg" width="1360" height="640"/>
  <text class="title" x="48" y="58">AO Arena deterministic scoreboard</text>
  <text class="subtitle" x="48" y="88">Fixture evidence becomes promotion-grade scores.</text>
  <rect class="card" x="48" y="160" width="180" height="132" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="66" y="191">Benchmark suite</text>
  <text class="small" x="66" y="218">Canonical tasks</text>
  <text class="small" x="66" y="238">Stable fixtures</text>
  <rect class="card" x="260" y="160" width="180" height="132" fill="#e8edf3" stroke="#64748b"/>
  <text class="cardTitle" x="278" y="191">Competitors</text>
  <text class="small" x="278" y="218"><tspan x="278" dy="0">Baseline and</tspan><tspan x="278" dy="16">challenger</tspan></text>
  <path class="arrow" d="M228 226 L260 226"/>
  <rect class="card" x="472" y="160" width="180" height="132" fill="#e9f7df" stroke="#64748b"/>
  <text class="cardTitle" x="490" y="191"><tspan x="490" dy="0">Fixture</tspan><tspan x="490" dy="19">attempts</tspan></text>
  <text class="small" x="490" y="240"><tspan x="490" dy="0">Evidence bundles</tspan><tspan x="490" dy="16">only</tspan></text>
  <path class="arrow" d="M440 226 L472 226"/>
  <rect class="card" x="684" y="160" width="180" height="132" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="702" y="191">Scorecards</text>
  <text class="small" x="702" y="218"><tspan x="702" dy="0">100-point</tspan><tspan x="702" dy="16">deterministic math</tspan></text>
  <path class="arrow" d="M652 226 L684 226"/>
  <rect class="card" x="896" y="160" width="180" height="132" fill="#eee8ff" stroke="#64748b"/>
  <text class="cardTitle" x="914" y="191"><tspan x="914" dy="0">Comparison</tspan><tspan x="914" dy="19">report</tspan></text>
  <text class="small" x="914" y="240"><tspan x="914" dy="0">Winner, evidence,</tspan><tspan x="914" dy="16">safety</tspan></text>
  <path class="arrow" d="M864 226 L896 226"/>
  <rect class="card" x="1108" y="160" width="180" height="132" fill="#ffe9d2" stroke="#64748b"/>
  <text class="cardTitle" x="1126" y="191">Promotion gate</text>
  <text class="small" x="1126" y="218">Score &gt;= 85</text>
  <text class="small" x="1126" y="238">Improvement &gt;= 5</text>
  <path class="arrow" d="M1076 226 L1108 226"/>
  <rect class="note" x="48" y="360" width="1264" height="76" fill="#e8edf3" stroke="#94a3b8"/>
  <text class="smallStrong" x="66" y="389">Arena does not promote candidates by itself; it supplies benchmark evidence to the gated promotion chain.</text>
</svg>
