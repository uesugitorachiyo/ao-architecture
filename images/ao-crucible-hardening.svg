<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="640" viewBox="0 0 1360 640" role="img" aria-labelledby="title desc">
  <title id="title">AO Crucible adversarial hardening</title>
  <desc id="desc">AO Crucible probes candidates with controlled adversarial fixtures before promotion.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #526070; }
      .band { rx: 8; }
      .bandText { font: 700 14px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { stroke-width: 2; rx: 8; }
      .note { stroke-width: 1.6; rx: 8; }
      .cardTitle { font: 700 18px Inter, Arial, sans-serif; fill: #162033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #162033; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #3a4758; }
      .smallStrong { font: 700 13px Inter, Arial, sans-serif; fill: #253244; }
      .label { font: 700 11px Inter, Arial, sans-serif; fill: #263447; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 7; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #cbd5e1; stroke-width: 1.4; }
      .cellHead { font: 700 14px Inter, Arial, sans-serif; fill: #162033; }
      .cellText { font: 400 12px Inter, Arial, sans-serif; fill: #39485a; }
    </style>
  </defs>
  <rect class="bg" width="1360" height="640"/>
  <text class="title" x="48" y="58">AO Crucible adversarial hardening</text>
  <text class="subtitle" x="48" y="88">Trust candidates only after controlled failure probes.</text>
  <rect class="card" x="48" y="160" width="180" height="132" fill="#e8edf3" stroke="#64748b"/>
  <text class="cardTitle" x="66" y="191">Subject</text>
  <text class="small" x="66" y="218"><tspan x="66" dy="0">AO orchestration</tspan><tspan x="66" dy="16">candidate</tspan></text>
  <rect class="card" x="260" y="160" width="180" height="132" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="278" y="191">Probe catalog</text>
  <text class="small" x="278" y="218">Injection</text>
  <text class="small" x="278" y="238">Spoofing</text>
  <text class="small" x="278" y="258">Stale proof</text>
  <path class="arrow" d="M228 226 L260 226"/>
  <rect class="card" x="472" y="160" width="180" height="132" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="490" y="191">Fixture run</text>
  <text class="small" x="490" y="218">Controlled scenarios</text>
  <path class="arrow" d="M440 226 L472 226"/>
  <rect class="card" x="684" y="160" width="180" height="132" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="702" y="191">Assessment</text>
  <text class="small" x="702" y="218">Resilience score</text>
  <text class="small" x="702" y="238">Risk notes</text>
  <path class="arrow" d="M652 226 L684 226"/>
  <rect class="card" x="896" y="160" width="180" height="132" fill="#e9f7df" stroke="#64748b"/>
  <text class="cardTitle" x="914" y="191">Hardening gate</text>
  <text class="small" x="914" y="218"><tspan x="914" dy="0">Pass or remediation</tspan><tspan x="914" dy="16">brief</tspan></text>
  <path class="arrow" d="M864 226 L896 226"/>
  <rect class="note" x="48" y="360" width="1264" height="76" fill="#e8edf3" stroke="#94a3b8"/>
  <text class="smallStrong" x="66" y="389">Crucible supplies hardening evidence that Promoter must consume; it does not activate candidates.</text>
</svg>
