<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">AO Mission pipeline</title>
  <desc id="desc">Mission records operator and gateway intent, then routes authorized work through Blueprint, optional Atlas compilation, Foundry coordination, Forge GoalRun orchestration, Covenant policy and approvals, AO2 execution, observer evidence, assurance evaluation, and read-only Command presentation.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #526070; }
      .band { rx: 8; }
      .bandText { font: 700 14px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { stroke-width: 2; rx: 8; }
      .note { stroke-width: 1.6; rx: 8; }
      .cardTitle { font: 700 18px Inter, Arial, sans-serif; fill: #162033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #162033; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #3a4758; }
      .smallStrong { font: 700 13px Inter, Arial, sans-serif; fill: #253244; }
      .label { font: 700 11px Inter, Arial, sans-serif; fill: #263447; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 7; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #cbd5e1; stroke-width: 1.4; }
      .cellHead { font: 700 14px Inter, Arial, sans-serif; fill: #162033; }
      .cellText { font: 400 12px Inter, Arial, sans-serif; fill: #39485a; }
    </style>
  </defs>
  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="48" y="58">AO Mission pipeline</text>
  <text class="subtitle" x="48" y="88">Mission owns lifecycle state; downstream components retain their own authority.</text>
  <rect class="band" x="48" y="116" width="1404" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="140">Intent, requirements, and work selection</text>
  <rect class="card" x="62" y="178" width="206" height="130" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="80" y="209"><tspan x="80" dy="0">Operator and</tspan><tspan x="80" dy="19">gateways</tspan></text>
  <text class="small" x="80" y="258"><tspan x="80" dy="0">Objective and status</tspan><tspan x="80" dy="16">requests</tspan></text>
  <text class="small" x="80" y="290"><tspan x="80" dy="0">Gateways are</tspan><tspan x="80" dy="16">intent/readback only</tspan></text>
  <rect class="card" x="310" y="178" width="206" height="130" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="328" y="209">AO Mission</text>
  <text class="small" x="328" y="236">Durable lifecycle</text>
  <text class="small" x="328" y="256">Routing and recovery</text>
  <rect class="card" x="558" y="178" width="206" height="130" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="576" y="209">AO Blueprint</text>
  <text class="small" x="576" y="236">Clarification</text>
  <text class="small" x="576" y="256">Bounded authorization</text>
  <rect class="card" x="806" y="178" width="206" height="130" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="824" y="209">AO Atlas</text>
  <text class="small" x="824" y="236">Workgraph and context</text>
  <text class="small" x="824" y="256"><tspan x="824" dy="0">When complexity</tspan><tspan x="824" dy="16">requires it</tspan></text>
  <rect class="card" x="1054" y="178" width="206" height="130" fill="#ffe9d2" stroke="#64748b"/>
  <text class="cardTitle" x="1072" y="209">AO Foundry</text>
  <text class="small" x="1072" y="236">Portfolio coordination</text>
  <text class="small" x="1072" y="256"><tspan x="1072" dy="0">Safe-next-work</tspan><tspan x="1072" dy="16">selection</tspan></text>
  <path class="arrow" d="M268 243 L302 243"/>
  <path class="arrow" d="M516 243 L550 243"/>
  <path class="arrow" d="M764 243 L798 243"/>
  <path class="arrow" d="M1012 243 L1046 243"/>
  <path class="dash" d="M661 308 C661 354 1157 350 1157 316"/>
  <rect class="chip" x="802" y="331" width="149" height="23"/>
  <text class="label" x="810" y="348">direct bounded work</text>
  <rect class="band" x="48" y="380" width="1404" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="404">Per-run orchestration, authority, and execution</text>
  <rect class="card" x="230" y="442" width="238" height="126" fill="#eee8ff" stroke="#64748b"/>
  <text class="cardTitle" x="248" y="473">AO Forge</text>
  <text class="small" x="248" y="500">Per-GoalRun orchestration</text>
  <text class="small" x="248" y="520">Plans and delegation</text>
  <rect class="card" x="630" y="442" width="238" height="126" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="648" y="473">AO Covenant</text>
  <text class="small" x="648" y="500">Contracts and policy</text>
  <text class="small" x="648" y="520">Approvals, trust, revocation</text>
  <rect class="card" x="1030" y="442" width="238" height="126" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="1048" y="473">AO2</text>
  <text class="small" x="1048" y="500">Governed execution</text>
  <text class="small" x="1048" y="520"><tspan x="1048" dy="0">Evidence and rollback</tspan><tspan x="1048" dy="16">receipts</tspan></text>
  <path class="arrow" d="M1157 308 C1157 376 349 380 349 434"/>
  <rect class="chip" x="722" y="365" width="72" height="23"/>
  <text class="label" x="730" y="382">delegate</text>
  <path class="arrow" d="M468 505 L622 505"/>
  <rect class="chip" x="488" y="474" width="128" height="23"/>
  <text class="label" x="496" y="491">request decision</text>
  <path class="arrow" d="M868 505 L1022 505"/>
  <rect class="chip" x="886" y="474" width="114" height="23"/>
  <text class="label" x="894" y="491">approved scope</text>
  <rect class="band" x="48" y="640" width="1404" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="664">Observation, assurance, and read-only presentation</text>
  <rect class="card" x="70" y="702" width="250" height="118" fill="#e9f7df" stroke="#64748b"/>
  <text class="cardTitle" x="88" y="733">AO2 Control Plane</text>
  <text class="small" x="88" y="760"><tspan x="88" dy="0">Observer-only evidence</tspan><tspan x="88" dy="16">storage</tspan></text>
  <text class="small" x="88" y="792">Read APIs</text>
  <rect class="card" x="390" y="702" width="250" height="118" fill="#e8edf3" stroke="#64748b"/>
  <text class="cardTitle" x="408" y="733">Arena and Crucible</text>
  <text class="small" x="408" y="760">Comparative evaluation</text>
  <text class="small" x="408" y="780">Adversarial probes</text>
  <rect class="card" x="710" y="702" width="250" height="118" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="728" y="733">Sentinel and Promoter</text>
  <text class="small" x="728" y="760">Monitoring and holds</text>
  <text class="small" x="728" y="780"><tspan x="728" dy="0">Decision preview, no</tspan><tspan x="728" dy="16">activation</tspan></text>
  <rect class="card" x="1030" y="702" width="250" height="118" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="1048" y="733">AO Command</text>
  <text class="small" x="1048" y="760"><tspan x="1048" dy="0">Read-only operator</tspan><tspan x="1048" dy="16">presentation</tspan></text>
  <text class="small" x="1048" y="792"><tspan x="1048" dy="0">Status, evidence, next</tspan><tspan x="1048" dy="16">actions</tspan></text>
  <path class="dash" d="M1149 568 C1149 630 195 632 195 694"/>
  <rect class="chip" x="702" y="613" width="72" height="23"/>
  <text class="label" x="710" y="630">evidence</text>
  <path class="dash" d="M320 761 L382 761"/>
  <path class="dash" d="M640 761 L702 761"/>
  <path class="dash" d="M960 761 L1022 761"/>
  <path class="dash" d="M1155 820 V850 H20 V243 H54"/>
  <rect class="chip" x="646" y="827" width="128" height="23"/>
  <text class="label" x="654" y="844">mission readback</text>
</svg>
