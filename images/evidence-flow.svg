<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
  <title id="title">AO execution and evidence flow</title>
  <desc id="desc">Operator intent enters Mission. Blueprint authorizes scope. Atlas may compile a workgraph, Foundry selects safe next work, Forge orchestrates a GoalRun, Covenant evaluates policy and approval, AO2 executes, the control plane observes evidence, assurance components evaluate results, and Command presents read-only status.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #526070; }
      .band { rx: 8; }
      .bandText { font: 700 14px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { stroke-width: 2; rx: 8; }
      .note { stroke-width: 1.6; rx: 8; }
      .cardTitle { font: 700 18px Inter, Arial, sans-serif; fill: #162033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #162033; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #3a4758; }
      .smallStrong { font: 700 13px Inter, Arial, sans-serif; fill: #253244; }
      .label { font: 700 11px Inter, Arial, sans-serif; fill: #263447; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 7; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #cbd5e1; stroke-width: 1.4; }
      .cellHead { font: 700 14px Inter, Arial, sans-serif; fill: #162033; }
      .cellText { font: 400 12px Inter, Arial, sans-serif; fill: #39485a; }
    </style>
  </defs>
  <rect class="bg" width="1500" height="920"/>
  <text class="title" x="48" y="58">AO execution and evidence flow</text>
  <text class="subtitle" x="48" y="88">Execution authority and evidence readback travel on distinct paths.</text>
  <rect class="band" x="48" y="116" width="1404" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="140">Governed work path</text>
  <rect class="card" x="54" y="180" width="162" height="106" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="72" y="211">Operator</text>
  <text class="small" x="72" y="238">Objective</text>
  <rect class="card" x="254" y="180" width="162" height="106" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="272" y="211">Mission</text>
  <text class="small" x="272" y="238"><tspan x="272" dy="0">Lifecycle and</tspan><tspan x="272" dy="16">route</tspan></text>
  <rect class="card" x="454" y="180" width="162" height="106" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="472" y="211">Blueprint</text>
  <text class="small" x="472" y="238"><tspan x="472" dy="0">Requirements and</tspan><tspan x="472" dy="16">authorization</tspan></text>
  <rect class="card" x="654" y="180" width="162" height="106" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="672" y="211">Atlas</text>
  <text class="small" x="672" y="238"><tspan x="672" dy="0">Optional</tspan><tspan x="672" dy="16">workgraph and</tspan><tspan x="672" dy="16">context</tspan></text>
  <rect class="card" x="854" y="180" width="162" height="106" fill="#ffe9d2" stroke="#64748b"/>
  <text class="cardTitle" x="872" y="211">Foundry</text>
  <text class="small" x="872" y="238">Safe next work</text>
  <rect class="card" x="1054" y="180" width="162" height="106" fill="#eee8ff" stroke="#64748b"/>
  <text class="cardTitle" x="1072" y="211">Forge</text>
  <text class="small" x="1072" y="238"><tspan x="1072" dy="0">GoalRun</tspan><tspan x="1072" dy="16">orchestration</tspan></text>
  <rect class="card" x="1254" y="180" width="162" height="106" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="1272" y="211">Covenant</text>
  <text class="small" x="1272" y="238"><tspan x="1272" dy="0">Policy and</tspan><tspan x="1272" dy="16">approval</tspan></text>
  <path class="arrow" d="M216 233 L246 233"/>
  <path class="arrow" d="M416 233 L446 233"/>
  <path class="arrow" d="M616 233 L646 233"/>
  <path class="arrow" d="M816 233 L846 233"/>
  <path class="arrow" d="M1016 233 L1046 233"/>
  <path class="arrow" d="M1216 233 L1246 233"/>
  <path class="dash" d="M535 286 C535 330 935 326 935 294"/>
  <rect class="chip" x="642" y="307" width="156" height="23"/>
  <text class="label" x="650" y="324">bounded direct route</text>
  <rect class="card" x="1254" y="358" width="162" height="106" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="1272" y="389">AO2</text>
  <text class="small" x="1272" y="416"><tspan x="1272" dy="0">Governed</tspan><tspan x="1272" dy="16">execution</tspan></text>
  <text class="small" x="1272" y="448">Run evidence</text>
  <path class="arrow" d="M1335 286 V350"/>
  <rect class="chip" x="1340" y="315" width="72" height="23"/>
  <text class="label" x="1348" y="332">decision</text>
  <rect class="band" x="48" y="526" width="1404" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="550">Observer and assurance path</text>
  <rect class="card" x="72" y="590" width="190" height="112" fill="#e9f7df" stroke="#64748b"/>
  <text class="cardTitle" x="90" y="621"><tspan x="90" dy="0">AO2 Control</tspan><tspan x="90" dy="19">Plane</tspan></text>
  <text class="small" x="90" y="670">Evidence storage</text>
  <text class="small" x="90" y="690">Read APIs</text>
  <rect class="card" x="326" y="590" width="190" height="112" fill="#e8edf3" stroke="#64748b"/>
  <text class="cardTitle" x="344" y="621">AO Arena</text>
  <text class="small" x="344" y="648">Benchmark comparison</text>
  <rect class="card" x="550" y="590" width="190" height="112" fill="#e8edf3" stroke="#64748b"/>
  <text class="cardTitle" x="568" y="621">AO Crucible</text>
  <text class="small" x="568" y="648">Adversarial probes</text>
  <rect class="card" x="774" y="590" width="190" height="112" fill="#ffe7ec" stroke="#64748b"/>
  <text class="cardTitle" x="792" y="621">AO Sentinel</text>
  <text class="small" x="792" y="648">Monitoring and holds</text>
  <rect class="card" x="998" y="590" width="190" height="112" fill="#ffe9d2" stroke="#64748b"/>
  <text class="cardTitle" x="1016" y="621">AO Promoter</text>
  <text class="small" x="1016" y="648">Candidate decision</text>
  <text class="small" x="1016" y="668">No activation</text>
  <rect class="card" x="1242" y="590" width="190" height="112" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="1260" y="621">AO Command</text>
  <text class="small" x="1260" y="648"><tspan x="1260" dy="0">Read-only</tspan><tspan x="1260" dy="16">presentation</tspan></text>
  <path class="dash" d="M1254 411 C1140 500 600 510 167 582"/>
  <rect class="chip" x="752" y="485" width="121" height="23"/>
  <text class="label" x="760" y="502">evidence export</text>
  <path class="dash" d="M262 646 L318 646"/>
  <path class="dash" d="M516 646 L542 646"/>
  <path class="dash" d="M740 646 L766 646"/>
  <path class="dash" d="M964 646 L990 646"/>
  <path class="dash" d="M1188 646 L1234 646"/>
  <path class="dash" d="M1337 702 V760 H20 V233 H246"/>
  <rect class="chip" x="646" y="737" width="128" height="23"/>
  <text class="label" x="654" y="754">mission readback</text>
  <rect class="note" x="72" y="788" width="1360" height="68" fill="#e8edf3" stroke="#94a3b8"/>
  <text class="smallStrong" x="90" y="817">The control plane observes evidence. Command presents it. Promoter evaluates candidate evidence and previews a decision and rollback plan; it does not perform activation.</text>
</svg>
