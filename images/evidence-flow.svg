<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="680" viewBox="0 0 1280 680" role="img" aria-labelledby="title desc">
  <title id="title">Evidence-first factory flow</title>
  <desc id="desc">Shows the lifecycle from AO Blueprint intake through AO Atlas context compilation, Foundry scheduling, Forge planning, Covenant policy, AO2 execution, control-plane readback, Command status, and assurance gates.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #fbfcfe; }
      .title { font: 700 32px Arial, sans-serif; fill: #172033; }
      .step { fill: #ffffff; stroke: #60708a; stroke-width: 2; rx: 10; }
      .gate { fill: #fff6df; stroke: #c98216; stroke-width: 2; rx: 10; }
      .evidence { fill: #eaf7ed; stroke: #4d8d52; stroke-width: 2; rx: 10; }
      .text { font: 700 15px Arial, sans-serif; fill: #172033; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .lane { font: 700 14px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="680"/>
  <text class="title" x="48" y="54">Evidence-first orchestration workflow</text>

  <rect class="step" x="48" y="110" width="150" height="86"/>
  <text class="text" x="85" y="146">Intent</text>
  <text class="small" x="75" y="172">operator goal</text>

  <rect class="gate" x="236" y="110" width="150" height="86"/>
  <text class="text" x="258" y="146">AO Blueprint</text>
  <text class="small" x="258" y="172">authorization</text>

  <rect class="step" x="424" y="110" width="150" height="86"/>
  <text class="text" x="456" y="146">AO Atlas</text>
  <text class="small" x="444" y="172">workgraph pack</text>

  <rect class="step" x="612" y="110" width="150" height="86"/>
  <text class="text" x="650" y="146">Foundry</text>
  <text class="small" x="642" y="172">schedule next</text>

  <rect class="step" x="800" y="110" width="150" height="86"/>
  <text class="text" x="842" y="146">Forge</text>
  <text class="small" x="824" y="172">GoalRun plan</text>

  <rect class="gate" x="988" y="110" width="150" height="86"/>
  <text class="text" x="1028" y="146">Covenant</text>
  <text class="small" x="1016" y="172">policy decision</text>

  <path class="arrow" d="M198 153 L236 153"/>
  <path class="arrow" d="M386 153 L424 153"/>
  <path class="arrow" d="M574 153 L612 153"/>
  <path class="arrow" d="M762 153 L800 153"/>
  <path class="arrow" d="M950 153 L988 153"/>

  <rect class="step" x="988" y="300" width="150" height="86"/>
  <text class="text" x="1047" y="336">AO2</text>
  <text class="small" x="1016" y="362">governed run</text>

  <rect class="evidence" x="800" y="300" width="150" height="86"/>
  <text class="text" x="846" y="336">Pack</text>
  <text class="small" x="822" y="362">events + digests</text>

  <rect class="evidence" x="612" y="300" width="150" height="86"/>
  <text class="text" x="638" y="336">Readback</text>
  <text class="small" x="631" y="362">control-plane</text>

  <rect class="evidence" x="424" y="300" width="150" height="86"/>
  <text class="text" x="459" y="336">Command</text>
  <text class="small" x="448" y="362">read-only status</text>

  <path class="arrow" d="M1063 196 L1063 300"/>
  <path class="arrow" d="M988 343 L950 343"/>
  <path class="arrow" d="M800 343 L762 343"/>
  <path class="arrow" d="M612 343 L574 343"/>

  <text class="lane" x="48" y="250">Execution lane: scope must be authorized and gated before side effects.</text>
  <text class="lane" x="48" y="442">Evidence lane: every meaningful decision leaves a durable, schema-backed record.</text>

  <rect class="evidence" x="138" y="500" width="210" height="82"/>
  <text class="text" x="185" y="534">AO Arena</text>
  <text class="small" x="174" y="560">benchmark score gate</text>
  <rect class="evidence" x="390" y="500" width="210" height="82"/>
  <text class="text" x="427" y="534">AO Crucible</text>
  <text class="small" x="424" y="560">adversarial hardening</text>
  <rect class="evidence" x="642" y="500" width="210" height="82"/>
  <text class="text" x="685" y="534">AO Sentinel</text>
  <text class="small" x="680" y="560">regression monitor</text>
  <rect class="evidence" x="894" y="500" width="210" height="82"/>
  <text class="text" x="936" y="534">AO Promoter</text>
  <text class="small" x="922" y="560">gated activation plan</text>

  <path class="arrow" d="M875 386 C825 460 760 488 747 500"/>
  <path class="arrow" d="M875 386 C720 464 535 488 495 500"/>
  <path class="arrow" d="M875 386 C610 466 290 488 243 500"/>
  <path class="arrow" d="M875 386 C930 450 982 482 999 500"/>

  <text class="small" x="48" y="642">Full autonomous RSI publication remains denied unless separate Covenant-approved mutation authority, rollback evidence, live self-change evidence, and observer readback exist.</text>
</svg>
