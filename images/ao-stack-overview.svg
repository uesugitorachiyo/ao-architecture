<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
  <title id="title">AO agent orchestration stack</title>
  <desc id="desc">Current AO architecture with Mission intake, Blueprint authorization, Atlas workgraph compilation, Foundry scheduling, Forge planning, Covenant gates, AO2 execution, read-only observers, and assurance gates.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #526070; }
      .band { rx: 8; }
      .bandText { font: 700 14px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { stroke-width: 2; rx: 8; }
      .note { stroke-width: 1.6; rx: 8; }
      .cardTitle { font: 700 18px Inter, Arial, sans-serif; fill: #162033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #162033; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #3a4758; }
      .smallStrong { font: 700 13px Inter, Arial, sans-serif; fill: #253244; }
      .label { font: 700 11px Inter, Arial, sans-serif; fill: #263447; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 7; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #cbd5e1; stroke-width: 1.4; }
      .cellHead { font: 700 14px Inter, Arial, sans-serif; fill: #162033; }
      .cellText { font: 400 12px Inter, Arial, sans-serif; fill: #39485a; }
    </style>
  </defs>
  <rect class="bg" width="1500" height="920"/>
  <text class="title" x="48" y="58">AO agent orchestration stack</text>
  <text class="subtitle" x="48" y="88"><tspan x="48" dy="0">Mission records intent; Blueprint authorizes; Atlas compiles; Foundry schedules; Forge plans; Covenant gates; AO2 executes;</tspan><tspan x="48" dy="19">observers read back.</tspan></text>
  <text class="smallStrong" x="56" y="128">Intake and decomposition</text>
  <text class="smallStrong" x="896" y="128">Factory path</text>
  <rect class="card" x="56" y="154" width="220" height="112" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="74" y="185">AO Mission</text>
  <text class="small" x="74" y="212">Mission record and route</text>
  <text class="small" x="74" y="232">Gateway/recovery readback</text>
  <rect class="card" x="336" y="154" width="220" height="112" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="354" y="185">AO Blueprint</text>
  <text class="small" x="354" y="212">Requirements interview</text>
  <text class="small" x="354" y="232">Build authorization gate</text>
  <rect class="card" x="616" y="154" width="220" height="112" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="634" y="185">AO Atlas</text>
  <text class="small" x="634" y="212">Stack-instance compiler</text>
  <text class="small" x="634" y="232"><tspan x="634" dy="0">Workgraphs and context</tspan><tspan x="634" dy="16">packs</tspan></text>
  <rect class="card" x="896" y="154" width="220" height="112" fill="#ffe9d2" stroke="#64748b"/>
  <text class="cardTitle" x="914" y="185">AO Foundry</text>
  <text class="small" x="914" y="212">Portfolio scheduling</text>
  <text class="small" x="914" y="232"><tspan x="914" dy="0">Readiness and PR</tspan><tspan x="914" dy="16">lifecycle</tspan></text>
  <rect class="card" x="1176" y="154" width="220" height="112" fill="#eee8ff" stroke="#64748b"/>
  <text class="cardTitle" x="1194" y="185">AO Forge</text>
  <text class="small" x="1194" y="212">One governed run</text>
  <text class="small" x="1194" y="232">GoalRun, plans, packets</text>
  <rect class="card" x="1176" y="330" width="220" height="112" fill="#eee8ff" stroke="#64748b"/>
  <text class="cardTitle" x="1194" y="361">AO Covenant</text>
  <text class="small" x="1194" y="388">Policy and trust gates</text>
  <text class="small" x="1194" y="408"><tspan x="1194" dy="0">Approvals, contracts,</tspan><tspan x="1194" dy="16">claims</tspan></text>
  <rect class="card" x="812" y="500" width="220" height="112" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="830" y="531">AO2</text>
  <text class="small" x="830" y="558">Governed execution</text>
  <text class="small" x="830" y="578"><tspan x="830" dy="0">Adapters, evidence,</tspan><tspan x="830" dy="16">closure</tspan></text>
  <rect class="card" x="448" y="500" width="220" height="112" fill="#e9f7df" stroke="#64748b"/>
  <text class="cardTitle" x="466" y="531">ao2-control-plane</text>
  <text class="small" x="466" y="558">Observer readback</text>
  <text class="small" x="466" y="578"><tspan x="466" dy="0">Signed ingest and</tspan><tspan x="466" dy="16">dashboards</tspan></text>
  <rect class="card" x="84" y="500" width="220" height="112" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="102" y="531">AO Command</text>
  <text class="small" x="102" y="558">Read-only operator view</text>
  <text class="small" x="102" y="578"><tspan x="102" dy="0">Status, evidence, next</tspan><tspan x="102" dy="16">actions</tspan></text>
  <path class="arrow" d="M276 210 L328 210"/>
  <rect class="chip" x="276" y="179" width="51" height="23"/>
  <text class="label" x="284" y="196">route</text>
  <path class="arrow" d="M556 210 L608 210"/>
  <rect class="chip" x="550" y="179" width="79" height="23"/>
  <text class="label" x="558" y="196">authorize</text>
  <path class="arrow" d="M836 210 L888 210"/>
  <rect class="chip" x="834" y="179" width="65" height="23"/>
  <text class="label" x="842" y="196">compile</text>
  <path class="arrow" d="M1116 210 L1168 210"/>
  <rect class="chip" x="1112" y="179" width="72" height="23"/>
  <text class="label" x="1120" y="196">delegate</text>
  <path class="arrow" d="M1286 266 V322"/>
  <rect class="chip" x="1294" y="289" width="44" height="23"/>
  <text class="label" x="1302" y="306">gate</text>
  <path class="arrow" d="M1176 392 C1068 410 956 448 922 492"/>
  <rect class="chip" x="1000" y="417" width="156" height="23"/>
  <text class="label" x="1008" y="434">allowed side effects</text>
  <path class="arrow" d="M812 556 L676 556"/>
  <rect class="chip" x="696" y="525" width="72" height="23"/>
  <text class="label" x="704" y="542">evidence</text>
  <path class="arrow" d="M448 556 L304 556"/>
  <rect class="chip" x="326" y="525" width="72" height="23"/>
  <text class="label" x="334" y="542">readback</text>
  <text class="smallStrong" x="56" y="682">Assurance and promotion gates</text>
  <rect class="card" x="56" y="706" width="220" height="78" fill="#ffffff" stroke="#64748b"/>
  <text class="cardTitle" x="74" y="737">AO Arena</text>
  <text class="small" x="74" y="764">Benchmark scoring</text>
  <rect class="card" x="336" y="706" width="220" height="78" fill="#ffffff" stroke="#64748b"/>
  <text class="cardTitle" x="354" y="737">AO Crucible</text>
  <text class="small" x="354" y="764">Adversarial hardening</text>
  <rect class="card" x="616" y="706" width="220" height="78" fill="#ffffff" stroke="#64748b"/>
  <text class="cardTitle" x="634" y="737">AO Sentinel</text>
  <text class="small" x="634" y="764">Regression holds</text>
  <rect class="card" x="896" y="706" width="220" height="78" fill="#ffffff" stroke="#64748b"/>
  <text class="cardTitle" x="914" y="737">AO Promoter</text>
  <text class="small" x="914" y="764">Gated activation</text>
  <path class="dash" d="M922 612 C900 654 752 684 166 698"/>
  <path class="dash" d="M922 612 C888 662 720 690 446 698"/>
  <path class="dash" d="M922 612 C862 668 746 690 726 698"/>
  <path class="dash" d="M922 612 C930 654 978 688 1006 698"/>
  <rect class="note" x="56" y="828" width="1184" height="46" fill="#e8edf3" stroke="#94a3b8"/>
  <text class="smallStrong" x="74" y="857">Atlas does not schedule, execute, approve, publish, call providers, or mutate sibling repositories. Command and control-plane remain read-only observers.</text>
</svg>
