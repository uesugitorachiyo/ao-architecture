<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000" role="img" aria-labelledby="title desc">
  <title id="title">AO agent orchestration stack</title>
  <desc id="desc">Mission is the operator lifecycle entry. Blueprint clarifies and authorizes work. Atlas compiles workgraphs when needed. Foundry selects safe next work, Forge orchestrates GoalRuns, Covenant decides policy and approvals, AO2 executes, the control plane observes evidence, Command presents read-only status, and assurance components evaluate results.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #526070; }
      .band { rx: 8; }
      .bandText { font: 700 14px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { stroke-width: 2; rx: 8; }
      .note { stroke-width: 1.6; rx: 8; }
      .cardTitle { font: 700 18px Inter, Arial, sans-serif; fill: #162033; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #162033; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #3a4758; }
      .smallStrong { font: 700 13px Inter, Arial, sans-serif; fill: #253244; }
      .label { font: 700 11px Inter, Arial, sans-serif; fill: #263447; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 7; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .cell { stroke: #cbd5e1; stroke-width: 1.4; }
      .cellHead { font: 700 14px Inter, Arial, sans-serif; fill: #162033; }
      .cellText { font: 400 12px Inter, Arial, sans-serif; fill: #39485a; }
    </style>
  </defs>
  <rect class="bg" width="1500" height="1000"/>
  <text class="title" x="48" y="58">AO agent orchestration stack</text>
  <text class="subtitle" x="48" y="88">One operator path, explicit authority boundaries, and read-only evidence presentation.</text>
  <rect class="band" x="48" y="116" width="1404" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="140">Operator lifecycle and governed execution</text>
  <rect class="card" x="54" y="178" width="190" height="124" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="72" y="209">AO Mission</text>
  <text class="small" x="72" y="236">Lifecycle entry</text>
  <text class="small" x="72" y="256"><tspan x="72" dy="0">State, route,</tspan><tspan x="72" dy="16">recovery</tspan></text>
  <rect class="card" x="286" y="178" width="190" height="124" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="304" y="209">AO Blueprint</text>
  <text class="small" x="304" y="236">Requirements</text>
  <text class="small" x="304" y="256">Build authorization</text>
  <rect class="card" x="518" y="178" width="190" height="124" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="536" y="209">AO Atlas</text>
  <text class="small" x="536" y="236">Workgraph and context</text>
  <text class="small" x="536" y="256">Used when required</text>
  <rect class="card" x="750" y="178" width="190" height="124" fill="#ffe9d2" stroke="#64748b"/>
  <text class="cardTitle" x="768" y="209">AO Foundry</text>
  <text class="small" x="768" y="236"><tspan x="768" dy="0">Portfolio</tspan><tspan x="768" dy="16">coordination</tspan></text>
  <text class="small" x="768" y="268">Safe next work</text>
  <rect class="card" x="982" y="178" width="190" height="124" fill="#eee8ff" stroke="#64748b"/>
  <text class="cardTitle" x="1000" y="209">AO Forge</text>
  <text class="small" x="1000" y="236">Per-GoalRun</text>
  <text class="small" x="1000" y="256">orchestration</text>
  <rect class="card" x="1214" y="178" width="190" height="124" fill="#fff2cf" stroke="#64748b"/>
  <text class="cardTitle" x="1232" y="209">AO Covenant</text>
  <text class="small" x="1232" y="236">Policy and approvals</text>
  <text class="small" x="1232" y="256">Trust and revocation</text>
  <path class="arrow" d="M244 240 L278 240"/>
  <path class="arrow" d="M476 240 L510 240"/>
  <path class="arrow" d="M708 240 L742 240"/>
  <path class="arrow" d="M940 240 L974 240"/>
  <path class="arrow" d="M1172 240 L1206 240"/>
  <path class="dash" d="M381 302 C381 350 845 342 845 310"/>
  <rect class="chip" x="508" y="323" width="156" height="23"/>
  <text class="label" x="516" y="340">bounded direct route</text>
  <rect class="card" x="1214" y="388" width="190" height="124" fill="#e4f1ff" stroke="#64748b"/>
  <text class="cardTitle" x="1232" y="419">AO2</text>
  <text class="small" x="1232" y="446">Governed execution</text>
  <text class="small" x="1232" y="466">Adapters and receipts</text>
  <path class="arrow" d="M1309 302 V380"/>
  <rect class="chip" x="1310" y="331" width="121" height="23"/>
  <text class="label" x="1318" y="348">policy decision</text>
  <rect class="band" x="48" y="558" width="1404" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="582">Observation and operator readback</text>
  <rect class="card" x="850" y="620" width="242" height="118" fill="#e9f7df" stroke="#64748b"/>
  <text class="cardTitle" x="868" y="651">AO2 Control Plane</text>
  <text class="small" x="868" y="678"><tspan x="868" dy="0">Observer-only evidence</tspan><tspan x="868" dy="16">storage</tspan></text>
  <text class="small" x="868" y="710">Read APIs</text>
  <rect class="card" x="296" y="620" width="242" height="118" fill="#e1f5ef" stroke="#64748b"/>
  <text class="cardTitle" x="314" y="651">AO Command</text>
  <text class="small" x="314" y="678"><tspan x="314" dy="0">Read-only operator</tspan><tspan x="314" dy="16">presentation</tspan></text>
  <text class="small" x="314" y="710">Status and next actions</text>
  <path class="arrow" d="M1214 450 C1140 498 1055 550 1000 612"/>
  <rect class="chip" x="1062" y="531" width="72" height="23"/>
  <text class="label" x="1070" y="548">evidence</text>
  <path class="arrow" d="M850 679 L546 679"/>
  <rect class="chip" x="657" y="648" width="79" height="23"/>
  <text class="label" x="665" y="665">read APIs</text>
  <path class="dash" d="M149 302 C149 520 244 580 340 612"/>
  <rect class="chip" x="160" y="495" width="114" height="23"/>
  <text class="label" x="168" y="512">mission status</text>
  <rect class="band" x="48" y="780" width="1404" height="36" fill="#172033"/>
  <text class="bandText" x="66" y="804">Evaluation and assurance</text>
  <rect class="card" x="62" y="834" width="190" height="92" fill="#ffffff" stroke="#64748b"/>
  <text class="cardTitle" x="80" y="865">AO Arena</text>
  <text class="small" x="80" y="892">Benchmark comparison</text>
  <rect class="card" x="286" y="834" width="190" height="92" fill="#ffffff" stroke="#64748b"/>
  <text class="cardTitle" x="304" y="865">AO Crucible</text>
  <text class="small" x="304" y="892">Adversarial probes</text>
  <rect class="card" x="510" y="834" width="190" height="92" fill="#ffffff" stroke="#64748b"/>
  <text class="cardTitle" x="528" y="865">AO Sentinel</text>
  <text class="small" x="528" y="892">Monitoring and holds</text>
  <rect class="card" x="734" y="834" width="190" height="92" fill="#ffffff" stroke="#64748b"/>
  <text class="cardTitle" x="752" y="865">AO Promoter</text>
  <text class="small" x="752" y="892">Candidate evaluation</text>
  <text class="small" x="752" y="912">Does not activate</text>
  <path class="dash" d="M971 738 C920 782 725 794 605 826"/>
  <rect class="chip" x="778" y="775" width="135" height="23"/>
  <text class="label" x="786" y="792">observed evidence</text>
  <path class="dash" d="M252 880 L278 880"/>
  <path class="dash" d="M476 880 L502 880"/>
  <path class="dash" d="M700 880 L726 880"/>
  <path class="dash" d="M829 834 C800 770 560 748 470 738"/>
  <rect class="chip" x="606" y="749" width="135" height="23"/>
  <text class="label" x="614" y="766">decision readback</text>
  <rect class="note" x="970" y="834" width="434" height="92" fill="#e8edf3" stroke="#94a3b8"/>
  <text class="smallStrong" x="988" y="863"><tspan x="988" dy="0">Promoter evaluates evidence and previews decisions and</tspan><tspan x="988" dy="18">rollback plans. It does not execute activation.</tspan></text>
</svg>
