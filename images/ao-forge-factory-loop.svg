<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">AO Forge factory loop</title>
  <desc id="desc">Shows objective to factory brief, workcell plan, Covenant gate, AO2 execution, evidence readback, and operator packet.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker></defs>
  <rect width="1080" height="620" fill="#f8f9ff"/>
  <text x="52" y="58" font-family="Arial" font-size="30" font-weight="700" fill="#172033">AO Forge: trusted factory brain</text>
  <circle cx="540" cy="322" r="168" fill="#e8ecff" stroke="#5967c9" stroke-width="3"/>
  <text x="475" y="314" font-family="Arial" font-size="24" font-weight="700" fill="#172033">GoalRun</text>
  <text x="440" y="344" font-family="Arial" font-size="15" fill="#334155">durable objective, phase, evidence, next action</text>
  <g font-family="Arial" font-size="16" font-weight="700" fill="#111827">
    <rect x="450" y="94" width="180" height="64" rx="12" fill="#ffffff" stroke="#5967c9" stroke-width="2"/>
    <text x="492" y="133">Objective</text>
    <rect x="754" y="188" width="200" height="64" rx="12" fill="#fff6df" stroke="#c9811d" stroke-width="2"/>
    <text x="796" y="227">Covenant gate</text>
    <rect x="754" y="394" width="200" height="64" rx="12" fill="#e1f0ff" stroke="#2678bd" stroke-width="2"/>
    <text x="810" y="433">AO2 run</text>
    <rect x="450" y="492" width="180" height="64" rx="12" fill="#e7f6ee" stroke="#4d8d52" stroke-width="2"/>
    <text x="487" y="531">Evidence</text>
    <rect x="126" y="394" width="210" height="64" rx="12" fill="#ffffff" stroke="#5967c9" stroke-width="2"/>
    <text x="177" y="433">Operator packet</text>
    <rect x="126" y="188" width="210" height="64" rx="12" fill="#ffffff" stroke="#5967c9" stroke-width="2"/>
    <text x="173" y="227">Factory plan</text>
  </g>
  <g stroke="#334155" stroke-width="2.4" fill="none" marker-end="url(#arrow)">
    <path d="M540 158 L540 154"/>
    <path d="M630 188 C675 178 718 188 754 220"/>
    <path d="M854 252 L854 394"/>
    <path d="M754 426 C698 486 665 516 630 524"/>
    <path d="M450 524 C383 502 348 462 336 426"/>
    <path d="M231 394 L231 252"/>
    <path d="M336 220 C386 188 420 172 450 158"/>
  </g>
  <text x="72" y="582" font-family="Arial" font-size="15" fill="#334155">Forge decides the next factory step, but it does not execute providers or become the evidence archive UI.</text>
</svg>
